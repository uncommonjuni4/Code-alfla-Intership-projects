<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Hub | Juni Life</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');

        :root {
            --accent: #ffb800; /* Royal Gold */
            --accent-2: #ff4e00; /* Sunset Orange */
            --bg: #0a0a0b; 
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 215, 0, 0.2);
            --wa-green: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0b;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Mesh Background */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(120px);
            opacity: 0.15;
            animation: moveGradient 20s infinite alternate;
        }

        body::before { background: var(--accent); top: -100px; left: -100px; }
        body::after { background: var(--accent-2); bottom: -100px; right: -100px; animation-delay: -10s; }

        @keyframes moveGradient {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, -100px) scale(1.1); }
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px) saturate(150%);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        }

        .top-bar { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        
        .logout-btn {
            background: rgba(255, 78, 0, 0.1);
            color: var(--accent-2);
            border: 1px solid var(--accent-2);
            padding: 5px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Profile Section */
        .profile-frame {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
        }

        .profile-frame::before {
            content: '';
            position: absolute;
            inset: -8px;
            border: 2px dashed var(--accent);
            border-radius: 50%;
            animation: rotateRing 15s linear infinite;
        }

        @keyframes rotateRing { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .circle-image {
            width: 100%; height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--bg);
        }
        .circle-image img { width: 100%; height: 100%; object-fit: cover; }

        .dev-name { font-size: 1.6rem; color: #fff; margin-bottom: 5px; }
        .dev-tag { color: var(--accent); font-weight: 800; letter-spacing: 2px; font-size: 0.7rem; margin-bottom: 25px; }

        /* Feedback Area */
        .feedback-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 25px;
            text-align: left;
            margin-bottom: 15px;
        }

        #feedbackInput {
            width: 100%; height: 80px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: #fff; padding: 12px;
            resize: none; outline: none; margin-bottom: 10px;
        }

        .send-btn {
            width: 100%;
            background: linear-gradient(to right, var(--accent), var(--accent-2));
            color: #000; border: none; padding: 12px;
            border-radius: 12px; font-weight: 800; cursor: pointer;
        }

        /* WhatsApp Button */
        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: rgba(37, 211, 102, 0.1);
            color: var(--wa-green);
            border: 1px solid var(--wa-green);
            padding: 12px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .whatsapp-btn:hover {
            background: var(--wa-green);
            color: #fff;
            transform: translateY(-3px);
        }

        .login-link { color: var(--accent); text-decoration: none; font-size: 0.8rem; border-bottom: 1px solid var(--accent); }

        .toast {
            position: fixed; bottom: -60px; left: 50%;
            transform: translateX(-50%);
            background: var(--accent); color: #000;
            padding: 12px 30px; border-radius: 50px;
            font-weight: bold; transition: 0.5s;
        }
        .toast.show { bottom: 40px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <a href="Gallery.html" class="back-link">← GO HOME</a>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <div class="dev-profile">
        <div class="profile-frame">
            <div class="circle-image">
                <img src="images/Fav-person/juni.jpg" alt="Juni Developer">
            </div>
        </div>

        <h2 class="dev-name">Juni Memoirs</h2>
        <p class="dev-tag">CREATIVE DEVELOPER</p>

        <div class="feedback-card">
            <h3 style="font-size: 0.8rem; color: #fff; margin-bottom: 10px;">Drop a Feedback</h3>
            <textarea id="feedbackInput" placeholder="How's your experience?"></textarea>
            <button class="send-btn" onclick="submitFeedback()">SUBMIT TO JUNI</button>
        </div>

        <a href="https://wa.me/923490819238?text=Hi%20Juni,%20I%20saw%20your%20Gallery%20App!" class="whatsapp-btn" target="_blank">
            <span>💬</span> Chat on WhatsApp
        </a>

        <a href="https://accounts.google.com/..." class="login-link">Admin Account</a>
    </div>
</div>

<div id="toast" class="toast">Successfully Sent! ✨</div>

<script>
    function submitFeedback() {
        const input = document.getElementById('feedbackInput');
        if(input.value.trim() !== "") {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            input.value = "";
            setTimeout(() => toast.classList.remove('show'), 3000);
        } else {
            alert("Bhai, kuch likho to sahi!");
        }
    }

    function logout() {
        if(confirm("Are you sure you want to exit?")) {
            window.location.href = "login.html";
        }
    }
</script>

</body>
</html>
